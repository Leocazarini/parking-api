services:
  bootstrap:
    build: .
    env_file: .env
    command: sh -c "alembic upgrade head && python scripts/create_admin.py"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: parking
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking"]
      interval: 5s
      timeout: 5s
      retries: 5

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    env_file: .env.test
    command: pytest tests/ -v
    profiles:
      - testing
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
