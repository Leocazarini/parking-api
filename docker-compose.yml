services:
  bootstrap:
    build: .
    env_file: .env
    command: python scripts/create_admin.py
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: parking
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking"]
      interval: 5s
      timeout: 5s
      retries: 5

  test:
    build: .
    env_file: .env.test
    command: pytest tests/ -v
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
